prerequisites:
  - "08-bell-state"
explanation: |
  ## 量子テレポーテーション

  量子テレポーテーションは、量子もつれと古典通信を使って
  量子状態を遠隔地に転送するプロトコルです。

  ### プロトコル
  1. **ベル対の共有**: Alice と Bob がベル状態 |Φ+⟩ を共有
  2. **ベル測定**: Alice が転送したい量子ビットとベル対の自分側を測定
  3. **古典通信**: Alice が測定結果 (2ビット) を Bob に送信
  4. **補正操作**: Bob が測定結果に基づいてゲートを適用

  ### 回路
  ```
  msg:   ───X───────────@───H───M───────────@───
                         |                   |
  a_bell:────────H───@───X───────M───@───────|───
                     |               |       |
  b_bell:────────────X───────────────X───@───M───
  ```

  量子状態そのものが「光速を超えて転送」されるわけではなく、
  古典通信 (測定結果の伝達) が必要なため、超光速通信にはなりません。
