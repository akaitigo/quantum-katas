solution_code: |
  import cirq

  alice_msg, alice_bell, bob_bell = cirq.LineQubit.range(3)

  circuit = cirq.Circuit()

  # Step 1: 転送したい状態を準備 (|1⟩ を転送)
  circuit.append(cirq.X(alice_msg))

  # Step 2: AliceとBobでベル対を共有
  circuit.append(cirq.H(alice_bell))
  circuit.append(cirq.CNOT(alice_bell, bob_bell))

  # Step 3: Aliceがベル測定を実行
  circuit.append(cirq.CNOT(alice_msg, alice_bell))
  circuit.append(cirq.H(alice_msg))
  circuit.append(cirq.measure(alice_msg, key='alice_msg'))
  circuit.append(cirq.measure(alice_bell, key='alice_bell'))

  # Step 4: 古典通信に基づくBobの補正操作
  circuit.append(cirq.CNOT(alice_bell, bob_bell))
  circuit.append(cirq.CZ(alice_msg, bob_bell))

  # Bob側の測定
  circuit.append(cirq.measure(bob_bell, key='bob_result'))

  sim = cirq.Simulator()
  result = sim.run(circuit, repetitions=10)
  print(result)
validation_code: |
  # Validates user's code in shared namespace
  import cirq as _cirq

  try:
      _user_circuit = circuit
  except NameError:
      raise AssertionError("変数 'circuit' が定義されていません")

  assert isinstance(circuit, _cirq.Circuit), \
      "'circuit' は cirq.Circuit のインスタンスである必要があります"

  # Verify the circuit has the necessary gates
  _has_h = False
  _has_cnot = False
  _has_cz = False
  for moment in circuit:
      for op in moment:
          if op.gate is not None:
              if isinstance(op.gate, _cirq.ops.HPowGate) and op.gate.exponent == 1:
                  _has_h = True
              if isinstance(op.gate, _cirq.ops.CNotPowGate):
                  _has_cnot = True
              if isinstance(op.gate, _cirq.ops.CZPowGate) and op.gate.exponent == 1:
                  _has_cz = True
  assert _has_h, "回路にアダマールゲートが含まれていません"
  assert _has_cnot, "回路にCNOTゲートが含まれていません"
  assert _has_cz, "回路にCZゲートが含まれていません"

  # Run the user's circuit
  _sim = _cirq.Simulator()
  _result = _sim.run(circuit, repetitions=100)
  assert 'bob_result' in _result.measurements, \
      "測定キー 'bob_result' が見つかりません"
  _bob_measurements = _result.measurements['bob_result'].flatten()
  assert all(m == 1 for m in _bob_measurements), \
      "Bobは常に|1⟩を受け取るべきです（Aliceが|1⟩を送信したため）"
  print("PASSED")
