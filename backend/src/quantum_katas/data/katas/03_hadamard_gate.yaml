id: "03-hadamard-gate"
title: "アダマールゲート"
description: |
  アダマール (Hadamard) ゲートを使って量子ビットの重ね合わせ状態を作成します。
  量子コンピューティングの核心的な概念を体験しましょう。
difficulty: 3
category: "basics"
template_code: |
  import cirq

  q = cirq.LineQubit(0)

  # アダマールゲートを適用して重ね合わせ状態を作成してください
  circuit = cirq.Circuit([
      # YOUR CODE HERE
      cirq.measure(q, key='result'),
  ])

  sim = cirq.Simulator()
  result = sim.run(circuit, repetitions=100)
  print(result)
solution_code: |
  import cirq

  q = cirq.LineQubit(0)

  circuit = cirq.Circuit([
      cirq.H(q),
      cirq.measure(q, key='result'),
  ])

  sim = cirq.Simulator()
  result = sim.run(circuit, repetitions=100)
  print(result)
validation_code: |
  # Validates user's code in shared namespace
  import cirq as _cirq

  try:
      _user_circuit = circuit
  except NameError:
      raise AssertionError("変数 'circuit' が定義されていません")

  assert isinstance(circuit, _cirq.Circuit), \
      "'circuit' は cirq.Circuit のインスタンスである必要があります"

  # Verify circuit contains an H gate
  _has_h = any(
      isinstance(op.gate, _cirq.ops.HPowGate) and op.gate.exponent == 1
      for moment in circuit
      for op in moment
      if op.gate is not None
  )
  assert _has_h, "回路にアダマールゲート (cirq.H) が含まれていません"

  # Run the user's circuit
  _sim = _cirq.Simulator()
  _result = _sim.run(circuit, repetitions=1000)
  assert 'result' in _result.measurements, \
      "測定キー 'result' が見つかりません"
  _measurements = _result.measurements['result'].flatten()
  _zeros = sum(1 for m in _measurements if m == 0)
  _ratio = _zeros / len(_measurements)
  assert 0.35 < _ratio < 0.65, \
      f"0と1がほぼ均等に出現すべきです (0の割合: {_ratio:.2f})"
  print("PASSED")
hints:
  - "アダマールゲートは cirq.H(qubit) で適用できます"
  - "H|0⟩ = (|0⟩ + |1⟩)/√2 — 0と1が50%ずつ出現する重ね合わせ状態になります"
  - "cirq.H(q) を測定の前に配置してください。1000回測定すると約500回ずつ0と1が出ます"
prerequisites:
  - "02-pauli-x-gate"
explanation: |
  ## アダマール (Hadamard) ゲート

  アダマールゲートは量子ビットを **重ね合わせ状態** にします:
  - |0⟩ → (|0⟩ + |1⟩) / √2
  - |1⟩ → (|0⟩ - |1⟩) / √2

  これは量子コンピューティングで最も重要なゲートの一つです。

  ### 行列表現
  ```
  H = (1/√2) | 1   1 |
              | 1  -1 |
  ```

  ### 回路
  ```
  0: ───H───M('result')───
  ```

  重ね合わせ状態を測定すると、50%の確率で0、50%の確率で1が得られます。
