id: "10-deutsch-jozsa"
title: "ドイチュ-ジョサアルゴリズム"
description: |
  量子並列性を活用したドイチュ-ジョサ (Deutsch-Jozsa) アルゴリズムを実装します。
  関数が「定数」か「バランス」かを1回のクエリで判定します。
difficulty: 10
category: "algorithms"
template_code: |
  import cirq

  input_qubit = cirq.LineQubit(0)
  output_qubit = cirq.LineQubit(1)

  # ドイチュ-ジョサアルゴリズムを実装してください
  # バランス関数 f(x) = x を使用（オラクル: CNOT）
  circuit = cirq.Circuit()

  # Step 1: 出力量子ビットを |1⟩ にする
  # YOUR CODE HERE

  # Step 2: 全量子ビットにアダマールゲートを適用
  # YOUR CODE HERE

  # Step 3: オラクル (f(x) = x → CNOT)
  # YOUR CODE HERE

  # Step 4: 入力量子ビットにアダマールゲートを適用
  # YOUR CODE HERE

  # Step 5: 入力量子ビットを測定
  circuit.append(cirq.measure(input_qubit, key='result'))

  sim = cirq.Simulator()
  result = sim.run(circuit, repetitions=10)
